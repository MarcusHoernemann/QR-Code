<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Q-R-Go v1.8.2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4b5563">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --bg-body: #4b5563; 
            --btn-base: #e5e7eb;
            --color-link: #22c55e;
            --color-vcard: #f97316;
            --text-on-light: #1f2937;
            --bg-panel: #111827;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 3.5rem 1.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
        }

        header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase; color: white; font-weight: 900; }
        .header-actions { display: flex; gap: 10px; }

        .icon-btn {
            background: var(--btn-base);
            border: 2px solid #9ca3af;
            color: #4b5563;
            width: 44px; height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        #install-prompt {
            display: none;
            width: 90%;
            max-width: 420px;
            background: var(--color-link);
            color: white;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        main { width: 100%; max-width: 420px; padding: 1rem; display: grid; gap: 1.2rem; }
        .qr-btn {
            width: 100%; background: var(--btn-base); color: var(--text-on-light);
            padding: 1.6rem; border-radius: 20px; font-size: 1.2rem; font-weight: 700;
            cursor: pointer; border: 3px solid transparent;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .qr-btn.type-link { border-color: var(--color-link); }
        .qr-btn.type-vcard { border-color: var(--color-vcard); }

        .panel {
            display: none; width: 92%; max-width: 420px; background: var(--bg-panel);
            padding: 2rem; border-radius: 28px; border: 2px solid #334155;
            margin-bottom: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: white;
        }
        .panel.active { display: block; }

        input { width: 100%; padding: 1rem; background: #020617; border: 1px solid #1e293b; color: white; border-radius: 12px; margin-bottom: 0.8rem; font-size: 16px; }
        .btn-primary { width: 100%; padding: 1rem; background: #374151; border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-text { width: 100%; padding: 0.8rem; background: transparent; border: none; color: #9ca3af; cursor: pointer; text-decoration: underline; }

        .qr-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        .qr-overlay.active { display: flex; }
        .qr-overlay-content { background: #111827; padding: 2rem; border-radius: 35px; text-align: center; width: 320px; }
        .qr-wrapper { background: white; padding: 1rem; border-radius: 15px; margin-bottom: 1.5rem; display: inline-block; }
        .qr-overlay img { display: block; width: 240px; height: 240px; }
        .btn-danger-action { margin-top: 15px; background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        footer { margin-top: auto; padding: 1.5rem 1rem; text-align: center; width: 100%; color: #94a3b8; font-size: 0.7rem; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <h1>Q-R-Go</h1>
    <div class="header-actions">
        <button class="icon-btn" onclick="togglePanel('backup-panel')">💾</button>
        <button class="icon-btn" onclick="togglePanel('add-code-form')">+</button>
    </div>
</header>

<div id="install-prompt" onclick="triggerInstall()">📱 Als App installieren</div>

<div id="backup-panel" class="panel">
    <h2 style="font-size: 0.9rem; text-transform: uppercase;">Backup</h2>
    <button class="btn-primary" onclick="exportData()">💾 Daten exportieren</button>
    <input type="file" id="import-file" style="display:none" onchange="importData(event)">
    <button class="btn-primary" style="margin-top:10px;" onclick="document.getElementById('import-file').click()">📂 Backup laden</button>
    <button class="btn-text" onclick="closePanels()">Schließen</button>
</div>

<div id="add-code-form" class="panel">
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button class="btn-primary" style="flex:1" id="type-vcard-btn" onclick="setType('vcard')">Kontakt</button>
        <button class="btn-primary" style="flex:1; opacity:0.5" id="type-link-btn" onclick="setType('link')">Link</button>
    </div>
    <input type="text" id="title" placeholder="Anzeigename">
    <div id="fields-link" style="display:none;"><input type="url" id="url" placeholder="https://..."></div>
    <div id="fields-vcard">
        <input type="text" id="v-name" placeholder="Name">
        <input type="text" id="v-func" placeholder="Funktion">
        <input type="tel" id="v-phone" placeholder="Telefon">
        <input type="email" id="v-email" placeholder="E-Mail">
    </div>
    <button class="btn-primary" onclick="saveNewCode()">Speichern</button>
    <button class="btn-text" onclick="closePanels()">Abbrechen</button>
</div>

<main id="app-container"></main>

<div id="qr-overlay" class="qr-overlay">
    <div class="qr-overlay-content">
        <div class="qr-wrapper"><img id="overlay-img" src="" alt="QR"></div>
        <br>
        <button class="btn-text" style="color:white" onclick="closeOverlay()">Schließen</button>
        <br>
        <button id="delete-current-btn" class="btn-danger-action">Eintrag löschen</button>
    </div>
</div>

<footer>
    <b>v1.8.2</b> &nbsp;|&nbsp; &copy; 2026 Marcus Hörnemann &nbsp;|&nbsp; Alle Rechte vorbehalten
</footer>

<script>
    const STORAGE_KEY = 'qr_go_v182';
    let collection = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentType = 'vcard';
    let activeId = null;
    let deferredPrompt;

    // PWA Install Prompt abfangen
    window.addEventListener('beforeinstallprompt', (e) => {
        console.log('Installationsbereit!');
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-prompt').style.display = 'block';
    });

    async function triggerInstall() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('install-prompt').style.display = 'none';
        deferredPrompt = null;
    }

    // Service Worker Registrierung
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('SW aktiv'))
            .catch(err => console.log('SW Fehler:', err));
    }

    function togglePanel(id) {
        const p = document.getElementById(id);
        const active = p.classList.contains('active');
        closePanels();
        if(!active) p.classList.add('active');
    }
    function closePanels() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); }
    
    function setType(t) {
        currentType = t;
        document.getElementById('type-vcard-btn').style.opacity = t === 'vcard' ? '1' : '0.5';
        document.getElementById('type-link-btn').style.opacity = t === 'link' ? '1' : '0.5';
        document.getElementById('fields-link').style.display = t === 'link' ? 'block' : 'none';
        document.getElementById('fields-vcard').style.display = t === 'vcard' ? 'block' : 'none';
    }

    function saveNewCode() {
        const title = document.getElementById('title').value.trim();
        const content = currentType === 'link' ? document.getElementById('url').value.trim() : 
            `BEGIN:VCARD\nVERSION:3.0\nFN:${document.getElementById('v-name').value}\nTITLE:${document.getElementById('v-func').value}\nTEL:${document.getElementById('v-phone').value}\nEMAIL:${document.getElementById('v-email').value}\nEND:VCARD`;
        if(!title || !content) return;
        collection.push({ id: Date.now(), title, content, type: currentType });
        saveAndRender();
        closePanels();
        document.querySelectorAll('input').forEach(i => i.value = '');
    }
    
    function saveAndRender() {
        collection.sort((a,b) => a.type === b.type ? a.title.localeCompare(b.title) : (a.type === 'vcard' ? -1 : 1));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collection));
        render();
    }
    
    function render() {
        const c = document.getElementById('app-container');
        c.innerHTML = '';
        collection.forEach(i => {
            const btn = document.createElement('button');
            btn.className = `qr-btn type-${i.type}`;
            btn.textContent = i.title;
            btn.onclick = () => showQr(i.content, i.id);
            c.appendChild(btn);
        });
    }

    window.showQr = function(data, id) {
        activeId = id;
        document.getElementById('overlay-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data)}`;
        document.getElementById('qr-overlay').classList.add('active');
    }
    
    function closeOverlay() { document.getElementById('qr-overlay').classList.remove('active'); }

    document.getElementById('delete-current-btn').onclick = () => {
        if(confirm('Eintrag löschen?')) {
            collection = collection.filter(item => item.id !== activeId);
            saveAndRender();
            closeOverlay();
        }
    };
    
    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(collection)], {type: 'application/json'}));
        a.download = 'qr_go_backup.json'; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = (ev) => { collection = JSON.parse(ev.target.result); saveAndRender(); closePanels(); };
        r.readAsText(e.target.files[0]);
    }
    saveAndRender();
</script>
</body>
</html>
