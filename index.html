<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q-R-Go v1.7.2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4b5563">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Q-R-Go">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --bg-body: #4b5563; 
            --btn-base: #e5e7eb;
            --color-link: #22c55e;
            --glow-link: rgba(34, 197, 94, 0.4);
            --color-vcard: #f97316;
            --glow-vcard: rgba(249, 115, 22, 0.4);
            --text-on-light: #1f2937;
            --text-on-dark: #f9fafb;
            --bg-panel: #111827;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-on-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        header {
            width: 100%;
            padding: 3rem 1.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: white;
            font-weight: 900;
        }

        .header-actions { display: flex; gap: 10px; }

        .icon-btn {
            background: var(--btn-base);
            border: 2px solid #9ca3af;
            color: #4b5563;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        main {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
            display: grid;
            gap: 1.2rem;
        }

        .btn-container { position: relative; width: 100%; }

        .qr-btn {
            width: 100%;
            background: var(--btn-base);
            color: var(--text-on-light);
            padding: 1.5rem;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid transparent;
        }

        .qr-btn.type-link { border-color: var(--color-link); box-shadow: 0 4px 12px var(--glow-link); }
        .qr-btn.type-vcard { border-color: var(--color-vcard); box-shadow: 0 4px 12px var(--glow-vcard); }

        .delete-btn {
            position: absolute;
            top: -8px; right: -6px;
            background: var(--danger);
            color: white;
            border: 2px solid var(--btn-base);
            width: 26px; height: 26px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }
        .btn-container:hover .delete-btn { opacity: 1; }

        .panel {
            display: none;
            width: 92%;
            max-width: 420px;
            background: var(--bg-panel);
            padding: 1.5rem;
            border-radius: 22px;
            border: 2px solid #334155;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            color: var(--text-on-dark);
        }
        .panel.active { display: block; animation: fadeIn 0.3s; }

        .type-selector { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
        .type-btn {
            flex: 1; padding: 0.6rem; background: #020617; border: 1px solid #334155;
            color: #9ca3af; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        .type-btn.active[data-type="link"] { border-color: var(--color-link); color: var(--color-link); }
        .type-btn.active[data-type="vcard"] { border-color: var(--color-vcard); color: var(--color-vcard); }

        input {
            width: 100%; padding: 0.8rem; background: #020617; border: 1px solid #1e293b;
            color: white; border-radius: 10px; margin-bottom: 0.6rem; font-size: 16px; /* 16px verhindert Auto-Zoom bei iOS */
        }

        .btn-primary { width: 100%; padding: 0.9rem; background: #374151; border: 1px solid #4b5563; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-text { width: 100%; padding: 0.6rem; background: transparent; border: none; color: #9ca3af; cursor: pointer; text-decoration: underline; font-size: 0.85rem; }

        .qr-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(8px);
        }
        .qr-overlay.active { display: flex; }
        .qr-overlay-content { background: #111827; padding: 2rem; border-radius: 30px; text-align: center; }
        .qr-wrapper { background: white; padding: 0.8rem; border-radius: 12px; margin-bottom: 1.2rem; display: inline-block; }
        .qr-overlay img { display: block; width: 240px; height: 240px; }
        .timer-bar { width: 100%; height: 5px; background: #020617; border-radius: 10px; margin-bottom: 1.2rem; overflow: hidden; }
        .timer-progress { height: 100%; background: white; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        footer {
            margin-top: auto;
            padding: 1.5rem 1rem;
            text-align: center;
            width: 100%;
            color: #94a3b8;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        footer b { color: #cbd5e1; }
    </style>
</head>
<body>

<header>
    <h1>Q-R-Go</h1>
    <div class="header-actions">
        <button class="icon-btn" onclick="togglePanel('backup-panel')">💾</button>
        <button class="icon-btn" onclick="togglePanel('add-code-form')">+</button>
    </div>
</header>

<div id="backup-panel" class="panel">
    <h2 style="font-size: 0.9rem; text-transform: uppercase; margin-top:0;">Backup</h2>
    <button class="btn-primary" onclick="exportData()">💾 Daten exportieren</button>
    <input type="file" id="import-file" style="display:none" onchange="importData(event)">
    <button class="btn-primary" style="margin-top:10px;" onclick="document.getElementById('import-file').click()">📂 Backup laden</button>
    <button class="btn-text" onclick="closePanels()">Schließen</button>
</div>

<div id="add-code-form" class="panel">
    <div class="type-selector">
        <button class="type-btn active" data-type="vcard" onclick="setType('vcard')">Kontakt</button>
        <button class="type-btn" data-type="link" onclick="setType('link')">Link</button>
    </div>
    <input type="text" id="title" placeholder="Anzeigename">
    <div id="fields-link" style="display:none;"><input type="url" id="url" placeholder="https://..."></div>
    <div id="fields-vcard">
        <input type="text" id="v-name" placeholder="Name">
        <input type="text" id="v-func" placeholder="Funktion">
        <input type="tel" id="v-phone" placeholder="Telefon">
        <input type="email" id="v-email" placeholder="E-Mail">
    </div>
    <button class="btn-primary" onclick="saveNewCode()">Speichern</button>
    <button class="btn-text" onclick="closePanels()">Abbrechen</button>
</div>

<main id="app-container"></main>

<div id="qr-overlay" class="qr-overlay">
    <div class="qr-overlay-content">
        <div class="timer-bar"><div id="timer-progress" class="timer-progress"></div></div>
        <div class="qr-wrapper"><img id="overlay-img" src="" alt="QR"></div>
        <br>
        <button class="btn-text" style="color:white" onclick="closeOverlay()">Schließen</button>
    </div>
</div>

<footer>
    <b>v1.7.2</b> &nbsp;|&nbsp; &copy; 2026 Marcus Hörnemann &nbsp;|&nbsp; Alle Rechte vorbehalten
</footer>

<script>
    const STORAGE_KEY = 'qr_go_v172';
    let collection = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentType = 'vcard';

    // Service Worker Registrierung
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log('Q-R-Go Service Worker aktiv.');
        });
    }

    function togglePanel(id) {
        const panel = document.getElementById(id);
        const isActive = panel.classList.contains('active');
        closePanels();
        if (!isActive) panel.classList.add('active');
    }

    function closePanels() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    }

    function setType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(b => {
            b.classList.toggle('active', b.getAttribute('data-type') === type);
        });
        document.getElementById('fields-link').style.display = type === 'link' ? 'block' : 'none';
        document.getElementById('fields-vcard').style.display = type === 'vcard' ? 'block' : 'none';
    }

    function saveNewCode() {
        const title = document.getElementById('title').value.trim();
        let content = "";
        if(currentType === 'link') {
            content = document.getElementById('url').value.trim();
        } else {
            const name = document.getElementById('v-name').value.trim();
            const func = document.getElementById('v-func').value.trim();
            const phone = document.getElementById('v-phone').value.trim();
            const email = document.getElementById('v-email').value.trim();
            content = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTITLE:${func}\nTEL:${phone}\nEMAIL:${email}\nEND:VCARD`;
        }
        if(!title || !content) return;
        collection.push({ id: Date.now(), title, content, type: currentType });
        saveAndRender();
        closePanels();
        document.querySelectorAll('input').forEach(i => i.value = '');
    }

    function deleteCode(id) {
        if(confirm('Löschen?')) {
            collection = collection.filter(i => i.id !== id);
            saveAndRender();
        }
    }

    function exportData() {
        if (collection.length === 0) return;
        const dataStr = JSON.stringify(collection);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', 'qr_go_backup.json');
        linkElement.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    if(confirm("Bestehende Daten überschreiben?")) {
                        collection = imported;
                        saveAndRender();
                        closePanels();
                    }
                }
            } catch (err) { alert("Fehler beim Import."); }
        };
        reader.readAsText(file);
    }

    function saveAndRender() {
        collection.sort((a, b) => {
            if (a.type === b.type) return a.title.localeCompare(b.title);
            return a.type === 'vcard' ? -1 : 1; 
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collection));
        render();
    }

    function render() {
        const container = document.getElementById('app-container');
        container.innerHTML = '';
        collection.forEach(item => {
            const div = document.createElement('div');
            div.className = 'btn-container';
            div.innerHTML = `
                <button class="qr-btn type-${item.type}" onclick="showQr('${item.content.replace(/\n/g, "\\n")}', '${item.type}')">${item.title}</button>
                <button class="delete-btn" onclick="deleteCode(${item.id})">✕</button>
            `;
            container.appendChild(div);
        });
    }

    window.showQr = function(data, type) {
        const decodedData = data.replace(/\\n/g, "\n");
        const overlay = document.getElementById('qr-overlay');
        const progress = document.getElementById('timer-progress');
        document.getElementById('overlay-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(decodedData)}`;
        progress.style.backgroundColor = type === 'link' ? 'var(--color-link)' : 'var(--color-vcard)';
        overlay.classList.add('active');
        progress.style.transition = 'none';
        progress.style.width = '100%';
        setTimeout(() => { progress.style.transition = 'width 20s linear'; progress.style.width = '0%'; }, 50);
        this.timer = setTimeout(closeOverlay, 20000);
    }

    function closeOverlay() {
        document.getElementById('qr-overlay').classList.remove('active');
        clearTimeout(window.showQr.timer);
    }

    saveAndRender();
</script>
</body>
</html>
